/*
 * JitPack 发布脚本（Groovy）。
 *
 * 启用方式（在 build.gradle.kts 里）：
 *   apply(from = "jitpack.gradle")
 *
 * 本地验证：
 *   ./gradlew :app:rv-page:publishToMavenLocal
 *
 * 使用方坐标：
 *   com.github.<USER>.<REPO>:rv-page:<TAG>
 */

apply plugin: 'maven-publish'

ext {
    publishGroupId    = 'com.github.gegeName'
    publishArtifactId = 'rv-page'
    publishVersion    = project.findProperty('VERSION_NAME') ?: '0.1.0-LOCAL'

    publishUrl        = 'https://github.com/gegeName/rv-page'
    publishDeveloperId   = 'gegeName'
    publishDeveloperName = 'gegeName'
}

android {
    publishing {
        singleVariant('release') {
            withSourcesJar()
            withJavadocJar()
        }
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId    = publishGroupId
                artifactId = publishArtifactId
                version    = publishVersion

                pom {
                    name        = publishArtifactId
                    description = '页面级 RecyclerView 装配 DSL：多 section / 分页 / 静态混排，基于 PagingHelper'
                    url         = publishUrl

                    licenses {
                        license {
                            name         = 'The Apache Software License, Version 2.0'
                            url          = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                            distribution = 'repo'
                        }
                    }
                    developers {
                        developer {
                            id    = publishDeveloperId
                            name  = publishDeveloperName
                        }
                    }
                    scm {
                        url = publishUrl
                    }
                }
            }
        }
    }
}
